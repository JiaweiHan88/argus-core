appId: com.argus.core
productName: Argus
directories:
  buildResources: build
# Ad-hoc signs the macOS bundle after packing (we have no Developer ID, and electron-builder
# skips signing rather than ad-hoc signing). Without this the DMG reads as "damaged" on
# Apple Silicon. See build/afterPack.cjs for the full rationale.
afterPack: build/afterPack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  # Native binaries cannot be spawned from inside an asar (Electron virtualizes asar paths
  # for fs but not for CreateProcess/exec). Both bundled agent CLIs shipped broken because of
  # this. electron-builder auto-detects and unpacks executables, which is how they worked at
  # all, but relying on that detection is implicit — a dependency shipping a binary in a shape
  # it does not recognize would silently regress. Unpack node_modules explicitly instead.
  #
  # Scoped to the two binary-bearing packages rather than a blanket '**/node_modules/**',
  # which would inflate the installer and forfeit the asar for everything else. The tradeoff
  # is that each new provider needs a line here; `npm run smoke:packaged` is the backstop that
  # catches a forgotten one. If we grow past a handful of providers, switch to the blanket
  # pattern (as t3code does) and stop maintaining this list by hand.
  - '**/node_modules/@github/copilot-*/**'
  - '**/node_modules/@anthropic-ai/claude-agent-sdk-*/**'
extraResources:
  # Core-shipped internal packs (declarative only — no domain binaries baked in).
  # Loaded read-only from <resources>/packs.seed, distinct from the writable ARGUS_HOME/packs.
  - from: ../packs
    to: packs.seed
    filter:
      - '**/*'
      - '!**/bin-src/**'
      - '!**/node_modules/**'
  - from: resources/onboarding-sample
    to: onboarding-sample
    filter:
      - '**/*'
  - from: resources/core-skills
    to: core-skills
    filter:
      - '**/*'
win:
  executableName: argus
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # No Apple Developer ID yet, so we cannot Developer-ID-sign or notarize. We rely on
  # electron-builder 26's default ad-hoc signing (no `identity` key = ad-hoc when no cert
  # is present), which produces a VALID bundle signature. Do NOT set `identity: null` here:
  # that disables signing entirely, leaving the bundle with only the linker's stub sig and
  # no _CodeSignature/CodeResources — which macOS reports as "damaged, move to Trash" on a
  # quarantined download. A valid ad-hoc signature instead yields the ordinary "unidentified
  # developer" prompt users clear with right-click -> Open. This is not notarization.
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
